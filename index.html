<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#050508" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wilson Closet" />
  <link rel="apple-touch-icon" href="/icon-180.png" />

  <!-- Android / general -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <!-- SEO / Open Graph -->
  <meta name="description" content="Your personal wardrobe, organized and shareable." />
  <meta property="og:title" content="Wilson Closet" />
  <meta property="og:description" content="Your personal wardrobe, organized and shareable." />
  <meta property="og:image" content="/icon-512.png" />

  <title>Wilson Closet</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => {
            console.log('[Wilson Closet] SW registered, scope:', reg.scope)
            // Listen for SW messages (e.g. SYNC_NOW from background sync)
            navigator.serviceWorker.addEventListener('message', e => {
              if (e.data?.type === 'SYNC_NOW') {
                window.dispatchEvent(new CustomEvent('wc-sync-now'))
              }
            })
          })
          .catch(err => console.warn('[Wilson Closet] SW registration failed:', err))
      })
    }

    // Capture beforeinstallprompt for custom install button
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault()
      window._installPrompt = e
      window.dispatchEvent(new CustomEvent('wc-install-available'))
    })

    // Track when app is installed
    window.addEventListener('appinstalled', () => {
      window._installPrompt = null
      window.dispatchEvent(new CustomEvent('wc-installed'))
    })
  </script>
</body>
</html>
